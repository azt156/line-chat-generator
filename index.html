<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINE 教學對話圖產生器 PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f3f4f6;
      color: #222;
    }
    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 24px;
    }
    h1 { font-size: 24px; margin: 0 0 12px; }
    h2 { font-size: 18px; margin: 22px 0 10px; }
    label { display: block; font-size: 14px; font-weight: 700; margin: 12px 0 6px; }
    input, textarea, select, button {
      width: 100%;
      font-family: inherit;
      font-size: 15px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      padding: 10px 12px;
      background: #fff;
    }
    textarea { min-height: 230px; resize: vertical; line-height: 1.65; }
    button {
      border: 0;
      background: #06C755;
      color: white;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
    }
    button.secondary { background: #374151; }
    button.light { background: #e5e7eb; color: #111827; }
    .panel {
      background: white;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,.08);
    }
    .hint {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
    }
    .avatar-row {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 10px;
      align-items: center;
    }
    .avatar-preview {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #e5e7eb;
      background: #fff;
    }
    .preview-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
      padding: 10px;
      min-height: 920px;
    }

    .phone {
      width: 390px;
      height: 844px;
      background: #91A6B8;
      border-radius: 34px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,.22);
      position: relative;
      border: 8px solid #111;
    }
    .status {
      height: 28px;
      background: rgba(255,255,255,.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 18px;
      font-size: 12px;
      font-weight: 700;
    }
    .chat-header {
      height: 58px;
      background: #06C755;
      color: white;
      display: grid;
      grid-template-columns: 40px 1fr 92px;
      align-items: center;
      padding: 0 12px;
      font-weight: 800;
    }
    .icons { text-align: right; letter-spacing: 8px; font-size: 16px; white-space: nowrap; }
    .back { font-size: 28px; line-height: 1; }
    .chat-area {
      height: calc(100% - 28px - 58px - 62px);
      overflow: hidden;
      padding: 16px 12px;
      background-color: #91A6B8;
      background-size: cover;
      background-position: center;
    }
    .date-pill {
      width: fit-content;
      margin: 0 auto 16px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.22);
      color: white;
      font-size: 12px;
      font-weight: 700;
    }
    .msg {
      display: flex;
      gap: 8px;
      margin: 10px 0;
      align-items: flex-end;
    }
    .msg.right { justify-content: flex-end; }
    .msg-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
      flex: 0 0 38px;
      border: 2px solid rgba(255,255,255,.9);
    }
    .bubble-block { max-width: 76%; }
    .name {
      font-size: 12px;
      color: rgba(255,255,255,.95);
      margin: 0 0 3px 4px;
      text-shadow: 0 1px 2px rgba(0,0,0,.24);
      font-weight: 700;
    }
    .right .name {
      text-align: right;
      margin-right: 4px;
    }
    .bubble {
      display: inline-block;
      padding: 9px 12px;
      border-radius: 18px;
      background: #fff;
      font-size: 15px;
      line-height: 1.45;
      white-space: pre-wrap;
      box-shadow: 0 1px 1px rgba(0,0,0,.08);
      word-break: break-word;
    }
    .right .bubble {
      background: #8DE055;
      border-bottom-right-radius: 5px;
    }
    .left .bubble {
      border-bottom-left-radius: 5px;
    }
    .meta {
      font-size: 10px;
      color: rgba(255,255,255,.94);
      margin: 3px 4px;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(0,0,0,.2);
    }
    .right .meta { text-align: right; }
    .input-bar {
      height: 62px;
      background: #f8fafc;
      display: grid;
      grid-template-columns: 38px 1fr 38px 38px;
      align-items: center;
      gap: 6px;
      padding: 10px;
      font-size: 20px;
    }
    .fake-input {
      height: 36px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
    }

    /* 1:1 IG 圖卡模式：不使用完整手機框，保留 LINE 對話感 */
    .square .phone {
      width: 540px;
      height: 540px;
      border-radius: 24px;
      border: 0;
      box-shadow: 0 18px 40px rgba(0,0,0,.16);
    }
    .square .status,
    .square .chat-header,
    .square .input-bar {
      display: none;
    }
    .square .chat-area {
      height: 100%;
      padding: 28px;
    }
    .square .bubble {
      font-size: 17px;
    }

    /* 3:4 教學海報模式 */
    .poster .phone {
      width: 600px;
      height: 800px;
      border-radius: 30px;
      border: 0;
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
    }
    .poster .status,
    .poster .input-bar {
      display: none;
    }
    .poster .chat-header {
      height: 64px;
      grid-template-columns: 40px 1fr 92px;
    }
    .poster .chat-area {
      height: calc(100% - 64px);
      padding: 26px 28px;
    }
    .poster .bubble {
      font-size: 18px;
      line-height: 1.55;
    }
    .poster .msg-avatar {
      width: 48px;
      height: 48px;
      flex-basis: 48px;
    }

    /* 長圖模式：向下延伸 */
    .long .phone {
      width: 430px;
      height: auto;
      min-height: 1220px;
      border-radius: 24px;
      border: 0;
      box-shadow: 0 18px 40px rgba(0,0,0,.16);
    }
    .long .status,
    .long .input-bar {
      display: none;
    }
    .long .chat-header {
      height: 62px;
    }
    .long .chat-area {
      height: auto;
      min-height: 1158px;
      overflow: visible;
      padding: 22px 14px 38px;
    }

    /* 黑白線稿模式 */
    .bw .phone,
    .bw .chat-area {
      background: #fff !important;
    }
    .bw .status,
    .bw .chat-header,
    .bw .input-bar {
      background: #fff !important;
      color: #111 !important;
      border-bottom: 2px solid #111;
    }
    .bw .bubble {
      border: 2px solid #111;
      box-shadow: none;
      background: #fff !important;
    }
    .bw .right .bubble {
      background: #eee !important;
    }
    .bw .date-pill {
      background: #fff;
      color: #111;
      border: 1px solid #111;
    }
    .bw .name,
    .bw .meta {
      color: #111;
      text-shadow: none;
    }
    .bw .msg-avatar {
      filter: grayscale(1);
      border: 2px solid #111;
    }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; padding: 14px; }
      .phone { transform: scale(.9); transform-origin: top center; }
      .preview-wrap { min-height: 780px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <h1>LINE 教學對話圖產生器 PRO</h1>
      <p class="hint">預設角色是小惠與小欣老師。可以改名、換頭像、換背景，也可以選擇長圖、IG 1:1、3:4 教學海報、9:16 手機截圖。</p>

      <h2>角色設定</h2>

      <label>左邊角色名稱</label>
      <input id="leftName" value="小惠" />

      <label>左邊角色頭像</label>
      <div class="avatar-row">
        <img id="leftPreview" class="avatar-preview" src="assets/xiaohui.png" />
        <input id="leftAvatar" type="file" accept="image/*" />
      </div>

      <label>右邊角色名稱</label>
      <input id="rightName" value="小欣老師" />

      <label>右邊角色頭像</label>
      <div class="avatar-row">
        <img id="rightPreview" class="avatar-preview" src="assets/teacher.png" />
        <input id="rightAvatar" type="file" accept="image/*" />
      </div>

      <h2>畫面設定</h2>

      <label>尺寸風格</label>
      <select id="ratio">
        <option value="phone">9:16 真實手機截圖模式</option>
        <option value="square">1:1 IG 圖卡模式</option>
        <option value="poster">3:4 教學海報模式</option>
        <option value="long">長圖模式（向下延伸）</option>
      </select>

      <label>視覺風格</label>
      <select id="styleMode">
        <option value="color">標準 LINE 彩色</option>
        <option value="bw">黑白線稿</option>
      </select>

      <label>聊天室背景圖</label>
      <input id="bgUpload" type="file" accept="image/*" />
      <button class="light" onclick="resetBg()">恢復預設背景</button>

      <h2>對話內容</h2>
      <p class="hint">格式請用：小惠：文字 或 小欣老師：文字。若你改了角色名稱，也請用新的名稱。</p>
      <textarea id="script">小惠：老師，為什麼冰塊會浮在水面上？
小欣老師：這跟密度有關。冰的密度比水小，所以會浮在水面上。
小惠：所以不是因為冰比較輕，而是同樣體積下比較輕？
小欣老師：沒錯！你抓到重點了。密度就是比較「同樣體積」時，誰含有比較多物質。
小惠：原來冰浮起來，其實是在告訴我們密度的概念！</textarea>

      <button onclick="renderChat()">更新畫面</button>
      <button class="secondary" onclick="downloadPNG()">匯出 PNG</button>
    </div>

    <div class="panel preview-wrap" id="exportAreaWrap">
      <div id="capture">
        <div class="phone" id="phone">
          <div class="status">
            <span>10:08</span>
            <span>●●● Wi‑Fi 🔋</span>
          </div>

          <div class="chat-header">
            <div class="back">‹</div>
            <div id="roomTitle">小惠 × 小欣老師</div>
            <div class="icons">☎︎ ◯ ☰</div>
          </div>

          <div class="chat-area" id="chatArea">
            <div class="date-pill">今天</div>
            <div id="messages"></div>
          </div>

          <div class="input-bar">
            <div>＋</div>
            <div class="fake-input"></div>
            <div>☺</div>
            <div>🎙</div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  let leftAvatar = "assets/xiaohui.png";
  let rightAvatar = "assets/teacher.png";
  let bgImage = "";

  function fileToURL(input, callback) {
    const file = input.files && input.files[0];
    if (!file) return;
    callback(URL.createObjectURL(file));
  }

  document.getElementById("leftAvatar").addEventListener("change", function () {
    fileToURL(this, (url) => {
      leftAvatar = url;
      document.getElementById("leftPreview").src = url;
      renderChat();
    });
  });

  document.getElementById("rightAvatar").addEventListener("change", function () {
    fileToURL(this, (url) => {
      rightAvatar = url;
      document.getElementById("rightPreview").src = url;
      renderChat();
    });
  });

  document.getElementById("bgUpload").addEventListener("change", function () {
    fileToURL(this, (url) => {
      bgImage = url;
      document.getElementById("chatArea").style.backgroundImage = `url(${url})`;
    });
  });

  document.getElementById("ratio").addEventListener("change", renderChat);
  document.getElementById("styleMode").addEventListener("change", renderChat);
  document.getElementById("leftName").addEventListener("input", renderChat);
  document.getElementById("rightName").addEventListener("input", renderChat);

  function resetBg() {
    bgImage = "";
    document.getElementById("chatArea").style.backgroundImage = "";
  }

  function parseMessages() {
    const leftName = document.getElementById("leftName").value.trim() || "小惠";
    const rightName = document.getElementById("rightName").value.trim() || "小欣老師";
    const text = document.getElementById("script").value.trim();
    const lines = text.split(/\n+/).map(x => x.trim()).filter(Boolean);

    // 重要修正：
    // 即使使用者把左邊角色改名為「小花」，
    // 對話文字仍然寫「小惠：」時，也會判定為左邊角色。
    // 這樣就不會發生「小惠的訊息跑到右邊」的問題。
    const leftAliases = uniqueNames([leftName, "小惠", "學生", "同學", "A"]);
    const rightAliases = uniqueNames([rightName, "小欣老師", "老師", "B"]);

    let result = [];

    for (const line of lines) {
      const parsed = parseLineByAliases(line, leftAliases, rightAliases);

      if (parsed) {
        result.push(parsed);
      } else {
        // 沒有角色標籤的續行，接在上一句同一側；
        // 如果是第一句沒有標籤，預設放左邊。
        const side = result.length ? result[result.length - 1].side : "left";
        if (result.length) {
          result[result.length - 1].text += "\n" + line;
        } else {
          result.push({ side, text: line });
        }
      }
    }

    return result;
  }

  function uniqueNames(arr) {
    return [...new Set(arr.map(x => String(x).trim()).filter(Boolean))];
  }

  function parseLineByAliases(line, leftAliases, rightAliases) {
    const clean = line.replace("：", ":").trim();

    for (const name of leftAliases) {
      const prefix = name + ":";
      if (clean.startsWith(prefix)) {
        return {
          side: "left",
          text: clean.slice(prefix.length).trim()
        };
      }
    }

    for (const name of rightAliases) {
      const prefix = name + ":";
      if (clean.startsWith(prefix)) {
        return {
          side: "right",
          text: clean.slice(prefix.length).trim()
        };
      }
    }

    return null;
  }

  function timeForIndex(i) {
    const baseMin = 8;
    const minute = baseMin + Math.floor(i * 1.45);
    return `10:${String(minute).padStart(2, "0")}`;
  }

  function renderChat() {
    const leftName = document.getElementById("leftName").value.trim() || "小惠";
    const rightName = document.getElementById("rightName").value.trim() || "小欣老師";
    const ratio = document.getElementById("ratio").value;
    const styleMode = document.getElementById("styleMode").value;
    const wrap = document.getElementById("exportAreaWrap");
    const messagesEl = document.getElementById("messages");

    document.getElementById("roomTitle").textContent = `${leftName} × ${rightName}`;

    wrap.classList.remove("square", "poster", "long", "bw");
    if (ratio === "square") wrap.classList.add("square");
    if (ratio === "poster") wrap.classList.add("poster");
    if (ratio === "long") wrap.classList.add("long");
    if (styleMode === "bw") wrap.classList.add("bw");

    messagesEl.innerHTML = "";

    parseMessages().forEach((msg, i) => {
      const name = msg.side === "left" ? leftName : rightName;
      const avatar = msg.side === "left" ? leftAvatar : rightAvatar;
      const time = timeForIndex(i);
      const row = document.createElement("div");
      row.className = `msg ${msg.side}`;

      if (msg.side === "left") {
        row.innerHTML = `
          <img class="msg-avatar" src="${avatar}" />
          <div class="bubble-block">
            <div class="name">${escapeHtml(name)}</div>
            <div class="bubble">${escapeHtml(msg.text)}</div>
            <div class="meta">${time}</div>
          </div>
        `;
      } else {
        row.innerHTML = `
          <div class="bubble-block">
            <div class="name">${escapeHtml(name)}</div>
            <div class="bubble">${escapeHtml(msg.text)}</div>
            <div class="meta">已讀 ${time}</div>
          </div>
          <img class="msg-avatar" src="${avatar}" />
        `;
      }
      messagesEl.appendChild(row);
    });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, (m) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[m]));
  }

  async function downloadPNG() {
    const target = document.getElementById("capture");
    const canvas = await html2canvas(target, {
      scale: 2,
      useCORS: true,
      backgroundColor: null
    });
    const link = document.createElement("a");
    link.download = "line-chat.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  }

  renderChat();
</script>
</body>
</html>
